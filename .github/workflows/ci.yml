name: CI - Bank API

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:

  # =========================
  # 🔎 LINT
  # =========================
  lint:
    name: 🔎 Lint (Ruff)
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4

    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.12

    - name: 📦 Install Ruff
      run: |
        python -m pip install --upgrade pip
        pip install ruff

    - name: 🔎 Run Ruff
      run: ruff check .


  # =========================
  # 🧪 UNIT TESTS + COVERAGE
  # =========================
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4

    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.12

    - name: 📦 Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🧪 Run Unit Tests with Coverage
      run: |
        pytest -m "not e2e" \
               --cov=app \
               --cov-report=term-missing \
               --cov-report=xml \
               --cov-fail-under=90

    - name: 📊 Upload Coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: true


  # =========================
  # 🌐 E2E TESTS
  # =========================
  e2e-tests:
    name: 🌐 E2E Tests (API)
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4

    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.12

    - name: 📦 Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🌐 Run E2E Tests
      run: |
        pytest -m e2e